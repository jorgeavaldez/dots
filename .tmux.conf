# Faster key repitition
set -s escape-time 0

# Extended keys for Shift+Enter, etc. (works with WezTerm's enable_kitty_keyboard)
set -g extended-keys on
set -g extended-keys-format csi-u
# Termius/iPad needs tmux to pass truecolor through; without RGB, TUI
# punctuation/dim syntax highlighting can be mapped to near-background colors.
set -g terminal-features[3] 'xterm*:RGB:extkeys'
set -g terminal-features[4] 'tmux*:RGB:extkeys'
set -g terminal-features[5] 'screen*:RGB:extkeys'
# Termius renders tmux's dim/italic styles poorly enough that low-contrast
# punctuation in TUIs can disappear. Keep truecolor, but suppress those attrs.
set -g terminal-overrides[1] 'xterm*:Tc:dim@:sitm@:ritm@'
set -g terminal-overrides[2] 'tmux*:Tc:dim@:sitm@:ritm@'
set -g terminal-overrides[3] 'screen*:Tc:dim@:sitm@:ritm@'
set -g default-terminal "tmux-256color"

# Rather than constraining window size to the maximum size of any client 
# connected to the *session*, constrain window size to the maximum size of any 
# client connected to *that window*. Much more reasonable.
# NOTE: Comment below to enable iterm integration
setw -g aggressive-resize on

# Highlight active window
# set-window-option -g window-status-current-style bg=red
# set -g mode-style bg=red,fg=green,blink

# Turn on mouse support
set -g mouse on

# Mobile/mosh-friendly wheel behavior. tmux's default forwards wheel events to
# alternate-screen apps (Pi/Claude/vim/less) instead of entering tmux scrollback.
# On iPad that often feels like scrolling is broken, so make wheel-up enter tmux
# copy mode unless the app explicitly enabled mouse tracking.
bind-key -T root WheelUpPane if-shell -F '#{||:#{pane_in_mode},#{mouse_any_flag}}' 'send-keys -M' 'copy-mode -e; send-keys -X -N 3 scroll-up'
bind-key -T root WheelDownPane if-shell -F '#{||:#{pane_in_mode},#{mouse_any_flag}}' 'send-keys -M' ''
bind-key -T copy-mode-vi WheelUpPane select-pane \; send-keys -X -N 3 scroll-up
bind-key -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 3 scroll-down

# Copy tmux selections to the outer terminal clipboard via OSC 52 when the
# client supports it. This is the only way tmux copy-mode selections can reach
# an iPad clipboard; Cmd-C only copies Termius's native selection, not tmux's.
set -g set-clipboard on
set -g allow-passthrough on
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel

# Vim bindings for splits and windows
bind-key v split-window -h
bind-key s split-window -v
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Set vim shortcuts
setw -g mode-keys vi



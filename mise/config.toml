[tools]
deno = "latest"
elixir = "latest"
erlang = "latest"
go = "latest"
java = "latest"
lua = "latest"
node = "latest"
# another npm client, mise uses it, jdx made it
aube = "latest"
pnpm = "latest"
"npm:@biomejs/biome" = "latest"
python = "latest"
rust = "latest"
uv = "latest"
"npm:@mermaid-js/mermaid-cli" = "latest"
"npm:@openai/codex" = "latest"
yamlfmt = "latest"
yq = "latest"
# tv - fuzzy finder
television = "latest"
"npm:@earendil-works/pi-coding-agent" = { version = "latest", allow_builds = [
  "@google/genai",
  "protobufjs",
] }
tmux = "latest"
pitchfork = "latest"
# gh cli
"aqua:cli/cli" = "2.87.3"
"npm:prettier" = "latest"
fd = "latest"
jj = "latest"
"cargo:jj-starship" = "latest"
1password-cli = "latest"
zig = "latest"
zls = "latest"
"aqua:JohnnyMorganz/StyLua" = "latest"
"pipx:pre-commit" = "latest"
"cargo:qsv" = "latest"
claude-code = "latest"
shfmt = "latest"
cmake = "latest"
shellcheck = "latest"
delta = "latest"
"npm:obsidian-headless" = "latest"
tree-sitter = "latest"
yazi = "latest"
bun = "latest"
# another diff viewer
"npm:hunkdiff" = "latest"
actionlint = "latest"
taplo = "latest"
"npm:@tobilu/qmd" = { version = "latest", allow_builds = [
  "better-sqlite3",
  "node-llama-cpp",
  "tree-sitter-go",
  "tree-sitter-javascript",
  "tree-sitter-python",
  "tree-sitter-rust",
  "tree-sitter-typescript",
] }
cloudflared = "latest"
herdr = "latest"

[settings]
idiomatic_version_file_enable_tools = ["python"]
experimental = true

[settings.python]
uv_venv_auto = "source"

[settings.pipx]
uvx = true
